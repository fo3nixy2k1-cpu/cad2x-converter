name: Build cad2x Windows

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Qt
        run: |
          choco install qt5-static -y
          refreshenv
      
      - name: Build 3rdparty
        run: |
          cd 3rdparty/qtbase
          .\configure -developer-build -release -platform win32-g++ -static -confirm-license -opensource
          qmake -r -- -developer-build -release -platform win32-g++ -static -confirm-license -opensource
          mingw32-make -j4
        shell: cmd
      
      - name: Build cad2x
        run: |
          qmake -r
          mingw32-make -j4
        shell: cmd
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cad2x-windows
          path: cad2x.exe
