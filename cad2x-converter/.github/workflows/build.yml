name: Build cad2x Windows

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: ucrt64
      
      - name: Install Qt5 and toolchain
        run: |
          pacman -S --noconfirm mingw-w64-ucrt-x86_64-qt5 mingw-w64-ucrt-x86_64-make mingw-w64-ucrt-x86_64-gcc
      
      - name: Build cad2x
        run: |
          export PATH="/c/msys64/ucrt64/bin:$PATH"
          qmake -r
          mingw32-make -j4
        shell: bash
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cad2x-windows
          path: cad2x.exe
